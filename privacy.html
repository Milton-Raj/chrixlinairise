<head>

  <script src="supabase-client.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f0f1a;
      --bg2:     #14141f;
      --border:  rgba(255,255,255,0.08);
      --text:    #f1f5f9;
      --sub:     #94a3b8;
      --muted:   #64748b;
      --primary: #7c3aed;
      --font:    'Inter', sans-serif;
      --font-h:  'Syne', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.7; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,15,26,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-family: var(--font-h); font-size: 20px; font-weight: 800; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--primary); }
    .nav-back { font-size: 14px; color: var(--sub); padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px; transition: all 0.2s; }
    .nav-back:hover { color: var(--text); border-color: var(--primary); text-decoration: none; }

    /* PAGE */
    .page-wrap { max-width: 860px; margin: 0 auto; padding: 60px 24px 100px; }
    .page-header { margin-bottom: 48px; padding-bottom: 32px; border-bottom: 1px solid var(--border); }
    .page-header h1 { font-family: var(--font-h); font-size: clamp(28px,5vw,44px); font-weight: 800; margin-bottom: 12px; }
    .page-header .meta { font-size: 13px; color: var(--muted); }

    /* CONTENT STYLES */
    #privacyContent h2 {
      font-family: var(--font-h); font-size: 20px; font-weight: 700;
      color: var(--text); margin: 40px 0 14px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    #privacyContent h3 { font-size: 16px; font-weight: 600; color: var(--text); margin: 24px 0 10px; }
    #privacyContent p { color: var(--sub); margin-bottom: 14px; font-size: 15px; }
    #privacyContent ul, #privacyContent ol { color: var(--sub); margin: 0 0 16px 20px; font-size: 15px; }
    #privacyContent li { margin-bottom: 8px; }
    #privacyContent strong { color: var(--text); }
    #privacyContent a { color: var(--primary); }

    /* FOOTER */
    footer { background: var(--bg2); border-top: 1px solid var(--border); padding: 28px 24px; text-align: center; }
    footer p { font-size: 13px; color: var(--muted); }
    footer a { color: var(--sub); margin: 0 10px; }
    footer a:hover { color: var(--text); }

    @media (max-width: 600px) {
      .page-wrap { padding: 36px 16px 80px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Chrixlin <span>AI Rise</span></a>

`;

// ── LOAD CONTENT (Supabase → fallback to default) ─────────────────────────
(async function loadPrivacy() {
  var content = null;
  try {
    if (typeof ChrixlinDB !== 'undefined') {
      content = await ChrixlinDB.loadFromSupabase('site_settings', 'privacy_policy');
    }
  } catch(e) {}
  var el = document.getElementById('privacyContent');
  if (content && content.html) {
    el.innerHTML = content.html;
    if (content.updatedAt) {
      document.getElementById('privacyLastUpdated').textContent =
        'Last updated: ' + new Date(content.updatedAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    }
  } else {
    el.innerHTML = DEFAULT_PRIVACY;
  }
})();
</script>

</body>
</html>
